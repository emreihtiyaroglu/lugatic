name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

      - name: Unit tests
        run: npm test

      - name: web-ext lint
        run: npm run lint

      - name: Build extension zip
        run: npm run build

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: lugatic
          path: web-ext-artifacts/*.zip
